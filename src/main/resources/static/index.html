<!DOCTYPE html>
<html>
<head>
    <title>Bank System</title>
</head>
<body>

<h3>Create Account</h3>

<input id="name" placeholder="Name"><br>
<input id="mobile" placeholder="Mobile"><br>
<input id="accountNumber" placeholder="Account Number"><br>
<input id="age" placeholder="Age" type="number"><br>


<button onclick="createAccount()">Create</button>

<h2>Deposit Money</h2>

<input id="depAccount" placeholder="Account Number"><br>
<input id="depAmount" placeholder="Amount"><br>

<button onclick="deposit()">Deposit</button>

<p id="depResult"></p>

<hr>

<h2>Withdraw Money</h2>

<input id="withAccount" placeholder="Account Number"><br>
<input id="withAmount" placeholder="Amount"><br>

<button onclick="withdraw()">Withdraw</button>

<p id="withResult"></p>
<p id="result"></p>
<h1>Hello</h1>

<script src="script.js"></script>

</body>
</html>
